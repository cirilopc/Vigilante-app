<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vigilante Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .drop-zone { border: 2px dashed #007bff; padding: 30px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>
    <h1>👁️ Vigilante Pro</h1>
    <div id="drop-zone" class="drop-zone">Arrastra aquí (Videos/Fotos)</div>
    <div id="status" style="margin: 10px 0; color: yellow;"></div>
    <button id="saveBtn">Guardar Caso en Base de Datos</button>

    <script>
        let db;
        let pendingFiles = [];

        // 1. Abrir DB correctamente
        const request = indexedDB.open("VigilanteProDB", 1);
        request.onupgradeneeded = (e) => {
            e.target.result.createObjectStore("casos", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; };

        // 2. Procesar archivo
        document.getElementById('drop-zone').ondragover = (e) => e.preventDefault();
        document.getElementById('drop-zone').ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                pendingFiles.push({ name: file.name, data: event.target.result });
                document.getElementById('status').innerText = "Archivo listo: " + file.name;
            };
            reader.readAsDataURL(file);
        };

        // 3. Guardado seguro
        document.getElementById('saveBtn').onclick = () => {
            if (!db) return alert("DB no lista aún.");
            if (pendingFiles.length === 0) return alert("No hay archivos.");

            const tx = db.transaction("casos", "readwrite");
            const store = tx.objectStore("casos");
            const req = store.add({ fecha: new Date().toLocaleString(), files: pendingFiles });
            
            req.onsuccess = () => {
                alert("Guardado correctamente en IndexedDB");
                pendingFiles = [];
                document.getElementById('status').innerText = "";
            };
            req.onerror = (e) => alert("Error al guardar en disco: " + e.target.error);
        };
    </script>
</body>
</html>
