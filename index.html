<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vigilante Pro</title>
    <style>
        /* Estilos básicos */
        body { font-family: sans-serif; padding: 20px; }
        .drop-zone { border: 2px dashed #ccc; padding: 20px; text-align: center; margin-bottom: 10px; cursor: pointer; }
        #log { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>👁️ Vigilante Pro</h1>
    <div id="drop-zone" class="drop-zone">Arrastra archivos aquí</div>
    <button id="saveBtn">Guardar Caso</button>
    <div id="log"></div>

    <script>
        let db;
        const request = indexedDB.open("VigilanteDB", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('casos')) {
                db.createObjectStore('casos', { keyPath: 'id', autoIncrement: true });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            console.log("DB Conectada");
        };

        document.getElementById('saveBtn').onclick = () => {
            if (!db) {
                document.getElementById('log').innerText = "Error: DB no abierta.";
                return;
            }
            try {
                const transaction = db.transaction(['casos'], 'readwrite');
                const store = transaction.objectStore('casos');
                const nuevoCaso = { fecha: new Date().toLocaleString(), datos: "prueba" };
                const req = store.add(nuevoCaso);
                
                req.onsuccess = () => alert("Guardado con éxito");
                req.onerror = (e) => console.log("Error al guardar:", e.target.error);
            } catch (err) {
                document.getElementById('log').innerText = "Error fatal: " + err.message;
            }
        };
    </script>
</body>
</html>
