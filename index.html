
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIGILANTE PRO | Documentando la Verdad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid #450a0a; backdrop-filter: blur(10px); }
        .btn-panic { background: linear-gradient(135deg, #991b1b, #7f1d1d); }
        .recording-pulse { animation: pulse 1.5s infinite; border: 2px solid #ef4444 !important; color: #ef4444; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body class="p-4 bg-[#050505]">

    <main class="max-w-md mx-auto space-y-6">
        <div class="glass rounded-3xl p-6 shadow-2xl border-t border-red-900">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-red-900/30 rounded-full flex items-center justify-center border-2 border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                    <span class="text-3xl">👁️</span>
                </div>
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tighter text-red-500 text-center">VIGILANTE <span class="text-white">PRO</span></h1>
            <p class="text-[10px] text-zinc-500 font-mono uppercase italic mb-6 tracking-widest text-center">Documentando la verdad, restaurando tu paz.</p>
            
            <div class="space-y-4">
                <input type="text" id="phoneInput" placeholder="Número sospechoso" class="w-full p-4 bg-black border border-zinc-800 rounded-xl text-white outline-none focus:border-red-600">
                
                <div class="relative">
                    <textarea id="notes" class="w-full p-4 bg-black border border-zinc-800 rounded-xl h-24 text-white placeholder-zinc-600 outline-none focus:border-red-600" placeholder="¿Qué ocurrió? ..."></textarea>
                    <div class="absolute top-2 right-2 flex gap-2">
                        <button onclick="document.getElementById('notes').value=''" class="p-2 bg-zinc-800 rounded-full hover:bg-zinc-600 transition-all text-xs">🗑️</button>
                        <button id="micBtn" onclick="toggleDictation()" class="p-2 bg-zinc-800 rounded-full hover:bg-red-900 transition-all text-sm">🎙️</button>
                    </div>
                </div>

                <div id="dropZone" class="relative border-2 border-dashed border-zinc-700 bg-black rounded-xl p-4 text-center cursor-pointer">
                    <input type="file" id="mediaInput" multiple accept="audio/*,image/*,video/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div class="flex flex-col items-center justify-center pointer-events-none">
                        <span class="text-2xl">📁</span>
                        <span id="fileLabel" class="text-[9px] text-zinc-400 font-mono uppercase font-bold mt-2">Arrastra o clic para añadir archivos</span>
                    </div>
                </div>
                
                <!-- Lista de vista previa -->
                <div id="previewList" class="grid grid-cols-3 gap-2 mt-2"></div>

                <button onclick="saveEvidence()" class="w-full btn-panic text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">
                    GUARDAR EVIDENCIA
                </button>
            </div>
            
            <div class="mt-8 pt-4 border-t border-zinc-800 text-center text-[9px] text-zinc-600 font-mono">
                Powered by MikePC4000
            </div>
        </div>

        <div class="glass rounded-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Registros</h2>
                <button onclick="deleteSelected()" class="text-[9px] text-red-500 underline uppercase">Borrar Seleccionados</button>
            </div>
            <div id="evidenceList" class="space-y-3 max-h-80 overflow-y-auto"></div>
        </div>
    </main>

    <script>
        let evidences = JSON.parse(localStorage.getItem('evidences_vigilante')) || [];
        let filesQueue = [];

        function toggleDictation() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.onresult = (e) => document.getElementById('notes').value = Array.from(e.results).map(r => r[0].transcript).join('');
            recognition.start();
        }

        const mediaInput = document.getElementById('mediaInput');
        const previewList = document.getElementById('previewList');

        mediaInput.addEventListener('change', () => {
            filesQueue = Array.from(mediaInput.files);
            renderPreviews();
        });

        function renderPreviews() {
            previewList.innerHTML = filesQueue.map((f, i) => `
                <div class="relative bg-zinc-800 p-1 rounded text-[8px] truncate">
                    ${f.type.startsWith('image/') ? `<img src="${URL.createObjectURL(f)}" class="h-10 w-full object-cover">` : '📁 ' + f.name.substring(0, 8)}
                </div>
            `).join('');
        }

        async function saveEvidence() {
            const mediaList = [];
            for (let f of filesQueue) {
                mediaList.push({ data: await new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = e => res(e.target.result);
                    reader.readAsDataURL(f);
                }), type: f.type });
            }

            evidences.unshift({ id: Date.now(), timestamp: new Date().toLocaleString(), phone: document.getElementById('phoneInput').value, notes: document.getElementById('notes').value, mediaList, selected: false });
            localStorage.setItem('evidences_vigilante', JSON.stringify(evidences));
            filesQueue = [];
            previewList.innerHTML = '';
            renderList();
        }

        function renderList() {
            document.getElementById('evidenceList').innerHTML = evidences.map(e => `
                <div class="p-3 bg-zinc-900 border-l-4 ${e.selected ? 'border-yellow-600' : 'border-red-600'} rounded-r-lg">
                    <input type="checkbox" onchange="toggleSelection(${e.id})" ${e.selected ? 'checked' : ''} class="mr-2">
                    <span class="text-[9px] text-red-500">${e.timestamp}</span>
                    <p class="text-sm mt-1">${e.notes}</p>
                    <div class="grid grid-cols-3 gap-1 mt-2">
                        ${e.mediaList.map(m => m.type.startsWith('image/') ? `<img src="${m.data}" class="h-12 w-full object-cover rounded">` : `<div class="bg-zinc-800 p-2 rounded text-[8px]">${m.type.split('/')[0]}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleSelection(id) { evidences = evidences.map(e => e.id === id ? {...e, selected: !e.selected} : e); renderList(); }
        function deleteSelected() { evidences = evidences.filter(e => !e.selected); localStorage.setItem('evidences_vigilante', JSON.stringify(evidences)); renderList(); }
        renderList();
    </script>
</body>
</html>
