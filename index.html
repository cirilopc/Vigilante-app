<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIGILANTE PRO | Documentando la Verdad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid #450a0a; backdrop-filter: blur(10px); }
        .btn-panic { background: linear-gradient(135deg, #991b1b, #7f1d1d); }
    </style>
</head>
<body class="p-4 bg-[#050505]">

    <main class="max-w-md mx-auto space-y-6">
        <div class="glass rounded-3xl p-6 shadow-2xl border-t border-red-900">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-red-900/30 rounded-full flex items-center justify-center border-2 border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                    <span class="text-3xl">👁️</span>
                </div>
            </div>

            <h1 class="text-2xl font-black uppercase tracking-tighter text-red-500 text-center">
                VIGILANTE <span class="text-white">PRO</span>
            </h1>
            <p class="text-[10px] text-zinc-500 font-mono uppercase italic mb-6 tracking-widest text-center">
                Documentando la verdad, restaurando tu paz.
            </p>
            
            <div class="space-y-4">
                <a href="tel:" id="quickCall" class="block w-full bg-zinc-800 hover:bg-zinc-700 text-center py-4 rounded-xl font-bold transition-all border border-zinc-700 active:scale-95">
                    📞 LLAMAR O MARCAR
                </a>
                
                <input type="text" id="phoneInput" placeholder="Número sospechoso" class="w-full p-4 bg-black border border-zinc-800 rounded-xl text-white outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600">
                
                <textarea id="notes" class="w-full p-4 bg-black border border-zinc-800 rounded-xl h-24 text-white placeholder-zinc-600 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600" placeholder="¿Qué ocurrió? Breve..."></textarea>
                
                <button onclick="saveEvidence()" class="w-full btn-panic text-white py-5 rounded-2xl font-black uppercase tracking-widest text-lg shadow-xl active:scale-95 transition-all hover:bg-red-800">
                    GUARDAR EVIDENCIA
                </button>
            </div>
            
            <div class="mt-8 pt-4 border-t border-zinc-800 text-center">
                <p class="text-[9px] text-zinc-600 font-mono">Powered by MikePC4000</p>
            </div>
        </div>

        <div class="glass rounded-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Registros</h2>
                <button onclick="deleteSelected()" class="text-[9px] text-red-500 hover:text-red-400 font-mono uppercase underline">Borrar Seleccionados</button>
            </div>
            <div id="evidenceList" class="space-y-3 max-h-80 overflow-y-auto"></div>
        </div>
    </main>

    <script>
        let evidences = JSON.parse(localStorage.getItem('evidences_vigilante')) || [];

        window.onload = renderList;

        function saveEvidence() {
            const noteInput = document.getElementById('notes');
            const phoneInput = document.getElementById('phoneInput');
            if(!noteInput.value) return;
            
            const entry = {
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                phone: phoneInput.value || "Sin número",
                notes: noteInput.value,
                selected: false
            };
            
            evidences.unshift(entry);
            localStorage.setItem('evidences_vigilante', JSON.stringify(evidences));
            noteInput.value = '';
            phoneInput.value = '';
            renderList();
        }

        function toggleSelection(id) {
            evidences = evidences.map(e => e.id === id ? {...e, selected: !e.selected} : e);
            renderList();
        }

        function deleteSelected() {
            if(confirm('¿Eliminar los registros seleccionados?')) {
                evidences = evidences.filter(e => !e.selected);
                localStorage.setItem('evidences_vigilante', JSON.stringify(evidences));
                renderList();
            }
        }

        function renderList() {
            const list = document.getElementById('evidenceList');
            if (evidences.length === 0) {
                list.innerHTML = '<p class="text-center text-zinc-600 text-xs py-4">No hay registros.</p>';
                return;
            }
            list.innerHTML = evidences.map(e => `
                <div class="flex items-center gap-3 p-3 bg-zinc-900 border-l-4 ${e.selected ? 'border-yellow-600' : 'border-red-600'} rounded-r-lg">
                    <input type="checkbox" ${e.selected ? 'checked' : ''} onchange="toggleSelection(${e.id})" class="accent-red-600 cursor-pointer">
                    <div class="flex-grow">
                        <div class="flex justify-between items-start">
                            <span class="text-[9px] text-red-500 font-mono">${e.timestamp}</span>
                            <span class="text-[9px] font-bold text-zinc-400">${e.phone}</span>
                        </div>
                        <p class="text-sm mt-1 text-zinc-300">${e.notes}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
