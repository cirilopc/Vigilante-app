<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vigilante Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .drop-zone { border: 2px dashed #007bff; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .drop-zone:hover { background: #f0f8ff; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>👁️ Vigilante Pro</h1>
    <div id="drop-zone" class="drop-zone">Arrastra fotos o vídeos aquí</div>
    <div id="file-preview"></div>
    <button id="saveBtn">Guardar Caso</button>

    <div id="modal"><span class="close-btn">&times;</span><div id="modal-content"></div></div>

    <script>
        let db;
        let filesToSave = [];
        const request = indexedDB.open("VigilanteDB", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('casos')) db.createObjectStore('casos', { keyPath: 'id', autoIncrement: true });
        };

        request.onsuccess = (e) => { db = e.target.result; };

        const dropZone = document.getElementById('drop-zone');
        dropZone.ondragover = (e) => e.preventDefault();
        dropZone.ondrop = (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    filesToSave.push({ name: file.name, data: event.target.result, type: file.type });
                    alert("Archivo añadido: " + file.name);
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('saveBtn').onclick = () => {
            if (!db) return alert("Base de datos no inicializada.");
            const transaction = db.transaction(['casos'], 'readwrite');
            const store = transaction.objectStore('casos');
            const caso = { fecha: new Date().toLocaleString(), archivos: filesToSave };
            
            const req = store.add(caso);
            req.onsuccess = () => {
                alert("Guardado con éxito");
                filesToSave = [];
            };
            req.onerror = (e) => alert("Error al guardar: " + e.target.error);
        };

        document.querySelector('.close-btn').onclick = () => {
            document.getElementById('modal').style.display = 'none';
            // Detener multimedia
            document.querySelectorAll('video, audio').forEach(media => {
                media.pause();
                media.currentTime = 0;
            });
        };
    </script>
</body>
</html>
