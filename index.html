<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIGILANTE PRO | Evidencia Multimedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid #330000; backdrop-filter: blur(10px); }
        .btn-panic { background: linear-gradient(135deg, #991b1b, #660000); }
    </style>
</head>
<body class="p-4 bg-[#050505]">

    <main class="max-w-xl mx-auto space-y-6 pb-20">
        <div class="glass rounded-3xl p-6 shadow-2xl border-t border-red-950">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-red-950/30 rounded-full flex items-center justify-center border-2 border-red-700 shadow-[0_0_20px_rgba(153,27,27,0.5)]">
                    <span class="text-3xl">👁️</span>
                </div>
            </div>
            <h1 class="text-3xl font-black uppercase tracking-tighter text-red-500 text-center">VIGILANTE <span class="text-white">PRO</span></h1>
            <p class="text-[10px] text-zinc-500 font-mono uppercase italic mb-6 tracking-widest text-center">Documentando la verdad, restaurando tu paz.</p>
            
            <div class="space-y-4">
                <textarea id="notes" class="w-full p-4 bg-black border border-zinc-800 rounded-xl h-28 text-white placeholder-zinc-600 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600" placeholder="Contexto de la evidencia..."></textarea>
                
                <div id="dropZone" class="relative border-4 border-dashed border-zinc-800 bg-black rounded-xl p-6 text-center cursor-pointer hover:border-red-900">
                    <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="flex flex-col items-center justify-center space-y-3">
                        <span class="text-4xl">📁</span>
                        <span class="text-xs text-zinc-400 font-bold uppercase">Arrastra o haz clic (Foto, Video, Audio)</span>
                    </div>
                </div>

                <div id="pendingFilesContainer" class="hidden space-y-3 bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                    <h3 class="text-[11px] font-bold text-zinc-400 uppercase">En cola (<span id="fileCount">0</span>)</h3>
                    <div id="queueList" class="grid grid-cols-4 gap-2 text-[8px] truncate"></div>
                </div>

                <button onclick="saveEvidence()" class="w-full btn-panic text-white py-5 rounded-2xl font-black uppercase shadow-xl active:scale-95">GUARDAR EVIDENCIA</button>
            </div>
        </div>

        <div class="glass rounded-3xl p-6">
            <h2 class="text-[11px] font-bold text-zinc-400 uppercase mb-4">Historial de Registros</h2>
            <div id="evidenceList" class="space-y-4"></div>
        </div>
    </main>

    <div id="mediaModal" class="fixed inset-0 bg-black/95 z-50 hidden p-4 flex flex-col justify-center items-center" onclick="closeModal()">
        <div id="modalContent" class="w-full max-w-4xl max-h-[85vh] flex justify-center items-center bg-black"></div>
        <button class="mt-6 px-6 py-2 bg-zinc-800 rounded-full text-xs font-bold text-white">Cerrar</button>
    </div>

    <script>
        let pendingFiles = [];
        let evidences = [];
        const DB_NAME = 'VigilantePro_Final';

        async function openDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore('evidences', { keyPath: 'id' });
                request.onsuccess = (e) => resolve(e.target.result);
            });
        }

        async function loadRecords() {
            const db = await openDB();
            const tx = db.transaction('evidences', 'readonly');
            const request = tx.objectStore('evidences').getAll();
            request.onsuccess = () => { evidences = request.result.reverse(); renderRecordList(); };
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pendingFiles.push({ name: file.name, type: file.type, data: e.target.result });
                    renderQueue();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderQueue() {
            document.getElementById('pendingFilesContainer').classList.remove('hidden');
            document.getElementById('fileCount').textContent = pendingFiles.length;
            document.getElementById('queueList').innerHTML = pendingFiles.map(f => `<div class="bg-black p-2 rounded">${f.name}</div>`).join('');
        }

        async function saveEvidence() {
            const entry = { id: Date.now(), timestamp: new Date().toLocaleString(), notes: document.getElementById('notes').value, media: pendingFiles };
            const db = await openDB();
            const tx = db.transaction('evidences', 'readwrite');
            tx.objectStore('evidences').add(entry);
            tx.oncomplete = () => { pendingFiles = []; document.getElementById('pendingFilesContainer').classList.add('hidden'); loadRecords(); document.getElementById('notes').value = ''; };
        }

        function renderRecordList() {
            document.getElementById('evidenceList').innerHTML = evidences.map(e => `
                <div class="p-4 bg-zinc-900 rounded-xl space-y-3 border-l-4 border-red-900">
                    <p class="text-xs text-zinc-500">${e.timestamp}</p>
                    <p class="text-sm">${e.notes}</p>
                    <div class="grid gap-2">
                        ${e.media.map(m => {
                            const blob = dataURLtoBlob(m.data);
                            const url = URL.createObjectURL(blob);
                            if(m.type.startsWith('image/')) return `<img src="${url}" class="rounded cursor-pointer" onclick="openModal('image', '${url}')">`;
                            if(m.type.startsWith('video/')) return `<video src="${url}" controls class="rounded w-full"></video>`;
                            if(m.type.startsWith('audio/')) return `<audio controls class="w-full bg-zinc-800 rounded p-1"><source src="${url}" type="${m.type}"></audio>`;
                            return `<div class="text-[10px] bg-zinc-800 p-2 rounded">Archivo: ${m.name}</div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function dataURLtoBlob(dataurl) {
            const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            for(let i=0; i<n; i++) u8arr[i] = bstr.charCodeAt(i);
            return new Blob([u8arr], {type:mime});
        }

        function openModal(type, url) {
            const content = type === 'image' ? `<img src="${url}" class="max-h-full">` : `<video controls autoplay class="max-h-full" src="${url}"></video>`;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('mediaModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('mediaModal').classList.add('hidden'); }
        
        document.getElementById('dropZone').addEventListener('drop', (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
        document.getElementById('dropZone').addEventListener('dragover', (e) => e.preventDefault());
        document.getElementById('mediaInput').addEventListener('change', (e) => handleFiles(e.target.files));
        window.onload = loadRecords;
    </script>
</body>
</html>
