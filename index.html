<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIGILANTE PRO | Evidencia Multimedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid #330000; backdrop-filter: blur(10px); }
        .btn-panic { background: linear-gradient(135deg, #991b1b, #660000); }
    </style>
</head>
<body class="p-4 bg-[#050505] min-h-screen">

    <main class="max-w-xl mx-auto space-y-6 pb-20">
        <div class="glass rounded-3xl p-6 shadow-2xl border-t border-red-950">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-red-950/30 rounded-full flex items-center justify-center border-2 border-red-700 shadow-[0_0_20px_rgba(153,27,27,0.5)]">
                    <span class="text-3xl">👁️</span>
                </div>
            </div>
            <h1 class="text-2xl font-black uppercase text-red-500 text-center">VIGILANTE <span class="text-white">PRO</span></h1>
            <p class="text-[10px] text-zinc-500 text-center mb-6 uppercase tracking-widest">Documentando la verdad, restaurando tu paz.</p>
            
            <input type="text" id="caseTitle" class="w-full p-3 mb-3 bg-black border border-zinc-800 rounded-lg text-white" placeholder="Nombre del caso...">
            
            <div class="relative">
                <textarea id="notes" class="w-full p-3 bg-black border border-zinc-800 rounded-lg h-24 text-white pr-10" placeholder="Descripción de lo ocurrido o usa el micrófono..."></textarea>
                <button type="button" onclick="toggleSpeechRecognition()" id="micBtn" class="absolute right-3 top-3 text-zinc-400 hover:text-red-500 transition cursor-pointer text-lg" title="Dictar por voz">
                    🎙️
                </button>
            </div>
            
            <div id="dropZone" class="mt-4 border-2 border-dashed border-zinc-800 p-6 text-center cursor-pointer hover:border-red-600 rounded-lg transition-all">
                <input type="file" id="mediaInput" multiple class="hidden">
                <p class="text-xs text-zinc-400">Arrastra archivos o haz clic para subir</p>
                <div id="progressBar" class="w-full h-1 bg-zinc-800 mt-4 rounded-full hidden overflow-hidden">
                    <div id="progressFill" class="h-full bg-red-600 w-0 transition-all"></div>
                </div>
            </div>

            <div id="previewList" class="mt-4 grid grid-cols-3 gap-2"></div>
            <button onclick="saveEvidence()" class="w-full mt-4 btn-panic py-3 rounded-lg font-bold uppercase hover:bg-red-700 transition cursor-pointer">Guardar Caso</button>
        </div>

        <div id="evidenceList" class="space-y-4"></div>
        
        <div class="text-center pt-8 border-t border-zinc-900">
            <p class="text-[9px] text-zinc-700 font-mono">IDB v3.0 | Powered by MikePC4000</p>
        </div>
    </main>

    <div id="mediaModal" class="fixed inset-0 bg-black/95 z-50 hidden flex justify-center items-center p-4">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-white text-3xl font-bold bg-red-900/50 rounded-full w-12 h-12 border-2 border-red-500 z-50 hover:bg-red-700 transition">×</button>
        <div id="modalContent" class="max-w-4xl w-full flex justify-center items-center"></div>
    </div>

    <script>
        const DB_NAME = 'VigilantePro_Final';
        const DB_VERSION = 2;
        let pendingFiles = [];
        let recognition = null;
        let isRecording = false;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('cases')) {
                        db.createObjectStore('cases', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        // Control de Reconocimiento de Voz (Transcripción)
        function toggleSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta la función de dictado por voz. Usa Google Chrome o Edge.");
                return;
            }

            const micBtn = document.getElementById('micBtn');
            const notesInput = document.getElementById('notes');

            if (!isRecording) {
                recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                recognition.continuous = true;
                recognition.interimResults = true;

                recognition.onstart = () => {
                    isRecording = true;
                    micBtn.classList.add('text-red-500', 'animate-pulse');
                    micBtn.title = "Escuchando... Haz clic para detener";
                };

                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        }
                    }
                    if (finalTranscript) {
                        notesInput.value += (notesInput.value ? ' ' : '') + finalTranscript;
                    }
                };

                recognition.onerror = (event) => {
                    console.error("Error de voz:", event.error);
                    stopSpeechRecognition();
                };

                recognition.onend = () => {
                    stopSpeechRecognition();
                };

                recognition.start();
            } else {
                stopSpeechRecognition();
            }
        }

        function stopSpeechRecognition() {
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            isRecording = false;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) {
                micBtn.classList.remove('text-red-500', 'animate-pulse');
                micBtn.title = "Dictar por voz";
            }
        }

        const dropZone = document.getElementById('dropZone');
        dropZone.onclick = () => document.getElementById('mediaInput').click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-red-600'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-red-600');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('border-red-600'); handleFiles(e.dataTransfer.files); };
        document.getElementById('mediaInput').onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const bar = document.getElementById('progressBar');
            const fill = document.getElementById('progressFill');
            bar.classList.remove('hidden');
            let count = 0;
            
            Array.from(files).forEach((f) => {
                const previewUrl = URL.createObjectURL(f);
                pendingFiles.push({ 
                    id: Date.now() + Math.random(), 
                    name: f.name, 
                    type: f.type, 
                    fileObj: f, 
                    previewUrl: previewUrl 
                });
                count++;
                fill.style.width = (count / files.length) * 100 + '%';
                renderPreview();
                if(count === files.length) setTimeout(() => bar.classList.add('hidden'), 500);
            });
        }

        function renderPreview() {
            const list = document.getElementById('previewList');
            list.innerHTML = pendingFiles.map((f, i) => `
                <div class="bg-zinc-900 p-2 rounded text-[9px] truncate relative border border-zinc-700">
                    ${f.type.startsWith('image/') ? `<img src="${f.previewUrl}" class="h-10 w-full object-cover rounded">` : `<div class="h-10 flex items-center justify-center text-zinc-400 font-mono">${f.name.split('.').pop().toUpperCase()}</div>`}
                    <button onclick="pendingFiles.splice(${i},1); renderPreview()" class="absolute -top-1 -right-1 bg-red-600 rounded-full w-4 h-4 text-[10px] text-white flex items-center justify-center cursor-pointer">×</button>
                </div>
            `).join('');
        }

        async function saveEvidence() {
            const title = document.getElementById('caseTitle').value.trim();
            const notes = document.getElementById('notes').value.trim();
            
            if(!title) {
                alert("Por favor, ingresa un título para el caso.");
                return;
            }
            
            try {
                const db = await openDB();
                const tx = db.transaction('cases', 'readwrite');
                const store = tx.objectStore('cases');
                
                const mediaData = pendingFiles.map(f => ({
                    name: f.name,
                    type: f.type,
                    blob: f.fileObj
                }));

                const entry = { 
                    id: Date.now(), 
                    timestamp: new Date().toLocaleString(), 
                    title, 
                    notes, 
                    media: mediaData 
                };
                
                store.add(entry);
                
                return new Promise((resolve, reject) => {
                    tx.oncomplete = () => {
                        pendingFiles = []; 
                        document.getElementById('caseTitle').value = ''; 
                        document.getElementById('notes').value = ''; 
                        document.getElementById('previewList').innerHTML = '';
                        loadRecords();
                        resolve();
                    };
                    tx.onerror = (e) => {
                        reject(e.target.error);
                    };
                });

            } catch (err) {
                console.error("Error al guardar:", err);
                alert("Error al guardar el caso: " + (err.message || err));
            }
        }

        async function loadRecords() {
            try {
                const db = await openDB();
                const tx = db.transaction('cases', 'readonly');
                const store = tx.objectStore('cases');
                const request = store.getAll();
                
                request.onsuccess = () => {
                    const results = request.result || [];
                    document.getElementById('evidenceList').innerHTML = results.reverse().map(c => `
                        <div class="glass p-5 rounded-2xl border border-zinc-800">
                            <h3 class="font-bold text-red-500 uppercase">${c.title}</h3>
                            <p class="text-[9px] text-zinc-500">${c.timestamp}</p>
                            <p class="text-sm text-zinc-300 my-2 italic">"${c.notes}"</p>
                            <div class="grid grid-cols-2 gap-2">
                                ${c.media.map(m => {
                                    const url = URL.createObjectURL(m.blob);
                                    if(m.type.startsWith('image/')) return `<img src="${url}" class="h-16 w-full object-cover rounded cursor-pointer" onclick="openModal('${url}', 'image')">`;
                                    if(m.type.startsWith('audio/')) return `<audio controls class="w-full h-10"><source src="${url}" type="${m.type}"></audio>`;
                                    return `<video src="${url}" class="h-16 w-full object-cover rounded cursor-pointer" onclick="openModal('${url}', 'video')"></video>`;
                                }).join('')}
                            </div>
                            <button onclick="deleteCase(${c.id})" class="mt-4 text-[10px] bg-red-900 px-3 py-1 rounded w-full hover:bg-red-800 transition cursor-pointer">ELIMINAR CASO COMPLETO</button>
                        </div>
                    `).join('');
                };
            } catch (err) {
                console.error("Error al cargar registros:", err);
            }
        }

        function openModal(url, type) {
            document.getElementById('modalContent').innerHTML = type === 'image' ? 
                `<img src="${url}" class="max-h-[80vh] w-auto">` : 
                `<video controls autoplay src="${url}" class="max-h-[80vh] w-full"></video>`;
            document.getElementById('mediaModal').classList.remove('hidden');
        }

        function closeModal() {
            const modal = document.getElementById('mediaModal');
            modal.querySelectorAll('video, audio').forEach(m => { m.pause(); m.currentTime = 0; });
            modal.classList.add('hidden');
        }

        async function deleteCase(id) {
            try {
                const db = await openDB();
                const tx = db.transaction('cases', 'readwrite');
                tx.objectStore('cases').delete(id);
                tx.oncomplete = () => loadRecords();
            } catch (err) {
                console.error("Error al eliminar el caso:", err);
            }
        }

        window.onload = loadRecords;
    </script>
</body>
</html>
