<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIGILANTE | MIKEPC4000</title>
    
    <!-- Configuración para Android/iOS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <!-- Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .red-glow { box-shadow: 0 0 30px rgba(220, 38, 38, 0.2); }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(153, 27, 27, 0.3); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #7f1d1d; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <main class="max-w-md mx-auto">
        <div class="glass rounded-3xl p-6 shadow-2xl red-glow">
            
            <!-- Icono Visual -->
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-red-950 rounded-2xl flex items-center justify-center border border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                    <span class="text-4xl">👁️</span>
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-white uppercase tracking-tighter">VIGILANTE</h1>
                <p class="text-[10px] text-red-500 font-mono tracking-widest uppercase italic mt-1">SISTEMA DE EVIDENCIA | MIKEPC4000</p>
            </div>
            
            <div class="space-y-4">
                <div class="relative">
                    <input type="datetime-local" id="timestamp" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-xl text-white font-mono focus:border-red-600 outline-none transition-all">
                </div>
                <div>
                    <textarea id="notes" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-xl h-32 text-white placeholder-zinc-600 focus:border-red-600 outline-none transition-all" placeholder="Detalles del suceso..."></textarea>
                </div>
                <button onclick="saveEvidence()" class="w-full bg-red-600 hover:bg-red-500 text-white py-4 rounded-xl font-bold uppercase tracking-widest transition-all shadow-lg shadow-red-900/50 active:scale-[0.98]">
                    Registrar Prueba
                </button>
            </div>

            <div class="mt-8">
                <h2 class="text-[10px] font-bold text-zinc-500 mb-4 uppercase tracking-widest border-b border-zinc-800 pb-2">Bitácora Activa</h2>
                <div id="evidenceList" class="space-y-3 custom-scrollbar max-h-60 overflow-y-auto"></div>
            </div>

            <button onclick="exportToPDF()" class="mt-6 w-full py-3 rounded-xl text-zinc-500 hover:text-red-500 border border-transparent hover:border-red-900 transition-all text-[10px] uppercase tracking-widest underline">
                Exportar Informe
            </button>
        </div>
    </main>

    <script>
        let evidences = JSON.parse(localStorage.getItem('evidences_vigilante')) || [];

        window.onload = () => {
            document.getElementById('timestamp').value = new Date().toISOString().slice(0, 16);
            renderList();
        };

        function saveEvidence() {
            const noteInput = document.getElementById('notes');
            if(!noteInput.value) return;
            
            const entry = {
                id: Date.now(),
                timestamp: document.getElementById('timestamp').value,
                notes: noteInput.value
            };
            evidences.unshift(entry);
            localStorage.setItem('evidences_vigilante', JSON.stringify(evidences));
            noteInput.value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('evidenceList');
            list.innerHTML = evidences.length === 0 ? 
                '<p class="text-zinc-700 text-xs text-center p-4">Sin registros...</p>' :
                evidences.map(e => `
                <div class="p-3 bg-zinc-900/50 border border-zinc-800 rounded-lg animate-in fade-in duration-500">
                    <p class="text-[9px] text-red-500 font-mono mb-1">${new Date(e.timestamp).toLocaleString()}</p>
                    <p class="text-xs text-zinc-300">${e.notes}</p>
                </div>
            `).join('');
        }

        function exportToPDF() {
            const report = "INFORME VIGILANTE - MIKEPC4000\n" + evidences.map(e => `[${e.timestamp}] ${e.notes}`).join('\n');
            const textarea = document.createElement('textarea');
            textarea.value = report;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert("Informe copiado al portapapeles.");
        }
    </script>
</body>
</html>
