
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIGILANTE PRO | Documentando la Verdad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid #450a0a; backdrop-filter: blur(10px); }
        .btn-panic { background: linear-gradient(135deg, #991b1b, #7f1d1d); }
        .recording-pulse { animation: pulse 1.5s infinite; border: 2px solid #ef4444 !important; color: #ef4444; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body class="p-4 bg-[#050505]">

    <!-- Modal para ver archivos en grande -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center p-4">
        <button onclick="closeModal()" class="absolute top-5 right-5 text-white text-3xl font-bold bg-zinc-800 rounded-full w-10 h-10 flex items-center justify-center hover:bg-zinc-700">✕</button>
        <div id="modalContent" class="max-w-full max-h-[80vh] flex items-center justify-center"></div>
    </div>

    <main class="max-w-md mx-auto space-y-6">
        <div class="glass rounded-3xl p-6 shadow-2xl border-t border-red-900">
            <h1 class="text-2xl font-black uppercase tracking-tighter text-red-500 text-center">VIGILANTE <span class="text-white">PRO</span></h1>
            <p class="text-[9px] text-center text-zinc-600 font-mono mb-4">Powered by MikePC4000</p>
            
            <div class="space-y-4">
                <input type="text" id="phoneInput" placeholder="Número sospechoso" class="w-full p-4 bg-black border border-zinc-800 rounded-xl text-white outline-none focus:border-red-600">
                <div class="relative">
                    <textarea id="notes" class="w-full p-4 bg-black border border-zinc-800 rounded-xl h-20 text-white outline-none focus:border-red-600" placeholder="¿Qué ocurrió? ..."></textarea>
                    <button id="micBtn" onclick="toggleDictation()" class="absolute top-2 right-2 p-2 bg-zinc-800 rounded-full text-xs">🎙️</button>
                </div>
                
                <div id="dropZone" class="border-2 border-dashed border-zinc-700 bg-black rounded-xl p-4 text-center cursor-pointer hover:border-red-600 transition-colors">
                    <input type="file" id="mediaInput" accept="audio/*,image/*,video/*" multiple class="hidden">
                    <div onclick="document.getElementById('mediaInput').click()">
                        <span class="text-2xl">📁</span>
                        <p class="text-[10px] text-zinc-400 font-mono uppercase mt-2">Arrastra o clic: Añadir archivos</p>
                    </div>
                </div>

                <div id="queueList" class="grid grid-cols-3 gap-2 mt-2"></div>
                
                <button onclick="saveEvidence()" class="w-full btn-panic text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">
                    GUARDAR EVIDENCIA
                </button>
            </div>
        </div>

        <div class="glass rounded-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Registros</h2>
                <button onclick="deleteSelected()" class="text-[9px] text-red-500 underline">Borrar Seleccionados</button>
            </div>
            <div id="evidenceList" class="space-y-4"></div>
        </div>
    </main>

    <script>
        let evidences = JSON.parse(localStorage.getItem('evidences_vigilante')) || [];
        let filesQueue = [];

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-red-600'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-red-600'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('border-red-600'); addFiles(e.dataTransfer.files); });
        document.getElementById('mediaInput').addEventListener('change', (e) => addFiles(e.target.files));

        function toggleDictation() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.onstart = () => document.getElementById('micBtn').classList.add('recording-pulse');
            rec.onresult = (e) => document.getElementById('notes').value = e.results[0][0].transcript;
            rec.onend = () => document.getElementById('micBtn').classList.remove('recording-pulse');
            rec.start();
        }

        function addFiles(files) {
            for(let f of files) filesQueue.push(f);
            renderQueue();
        }

        function renderQueue() {
            const list = document.getElementById('queueList');
            list.innerHTML = filesQueue.map((f, i) => `
                <div class="relative bg-zinc-800 rounded p-1 text-[10px] text-center">
                    <div class="h-12 flex items-center justify-center text-xl cursor-pointer">
                        ${f.type.startsWith('image/') ? '🖼️' : f.type.startsWith('video/') ? '🎬' : '🎵'}
                    </div>
                    <button onclick="filesQueue.splice(${i},1); renderQueue()" class="absolute -top-1 -right-1 bg-red-600 rounded-full w-4 h-4 text-[8px] text-white">✕</button>
                </div>
            `).join('');
        }

        async function saveEvidence() {
            const mediaData = [];
            for (let f of filesQueue) {
                const data = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = e => res(e.target.result);
                    reader.readAsDataURL(f);
                });
                mediaData.push({ data, type: f.type });
            }
            evidences.unshift({ id: Date.now(), timestamp: new Date().toLocaleString(), phone: document.getElementById('phoneInput').value, notes: document.getElementById('notes').value, mediaData, selected: false });
            localStorage.setItem('evidences_vigilante', JSON.stringify(evidences));
            filesQueue = [];
            renderQueue();
            renderList();
        }

        function renderList() {
            document.getElementById('evidenceList').innerHTML = evidences.map(e => `
                <div class="p-3 bg-zinc-900 border-l-4 ${e.selected ? 'border-yellow-600' : 'border-red-600'} rounded-r-lg">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] text-zinc-500">${e.timestamp}</span>
                        <input type="checkbox" onchange="toggleSelection(${e.id})" ${e.selected ? 'checked' : ''} class="accent-red-600">
                    </div>
                    <p class="text-sm mb-2">${e.notes}</p>
                    <div class="grid grid-cols-2 gap-2">
                        ${e.mediaData.map(m => `
                            <div class="bg-zinc-800 p-1 rounded text-center cursor-pointer">
                                ${m.type.startsWith('audio/') 
                                    ? `<audio controls class="w-full h-8"><source src="${m.data}"></audio>` 
                                    : `<div onclick="openModal('${m.data}', '${m.type}')" class="text-xs py-2 bg-zinc-700 rounded">${m.type.startsWith('image/') ? '📷 Imagen' : '🎥 Video'}</div>`}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleSelection(id) { evidences = evidences.map(e => e.id === id ? {...e, selected: !e.selected} : e); renderList(); }
        function deleteSelected() { evidences = evidences.filter(e => !e.selected); localStorage.setItem('evidences_vigilante', JSON.stringify(evidences)); renderList(); }

        function openModal(data, type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            if (type.startsWith('image/')) content.innerHTML = `<img src="${data}" class="max-w-full max-h-[80vh] rounded-lg">`;
            else if (type.startsWith('video/')) content.innerHTML = `<video controls src="${data}" class="max-w-full max-h-[80vh] rounded-lg"></video>`;
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        renderList();
    </script>
</body>
</html>
