    <script>
        // Inicialización segura para GitHub Pages
        window.addEventListener('DOMContentLoaded', () => {
            const request = indexedDB.open("VigilanteDB", 1);
            
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('casos')) {
                    db.createObjectStore('casos', { keyPath: 'id', autoIncrement: true });
                }
            };
            
            request.onsuccess = (e) => {
                console.log("Base de datos lista");
            };
        });
        
        // ... el resto de tus funciones de guardado ...
    </script>
