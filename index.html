<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vigilante Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; max-width: 800px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 50px; }
        .eslogan { color: #aaa; font-style: italic; margin-bottom: 10px; }
        .drop-zone { border: 2px dashed #ff0000; padding: 40px; text-align: center; cursor: pointer; border-radius: 10px; background: #1a1a1a; transition: 0.3s; }
        .drop-zone:hover { background: #250000; border-color: #ff4444; }
        button { background: #ff0000; color: white; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 5px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background: #cc0000; }
        .caso-item { background: #1a1a1a; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid #ff0000; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: black; font-size: 40px; cursor: pointer; background: #fff; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        #modal-content img, #modal-content video, #modal-content audio { max-width: 90vw; max-height: 80vh; border-radius: 5px; }
        footer { margin-top: 50px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">👁️</div>
        <h1>Vigilante Pro</h1>
        <div class="eslogan">Documentando la verdad...</div>
    </header>

    <div id="drop-zone" class="drop-zone">Arrastra aquí fotos, vídeos o audios</div>
    <div id="status" style="margin: 15px 0; color: #ff0000; text-align: center; font-weight: bold;"></div>
    <button id="saveBtn">Guardar Caso</button>

    <h2 style="margin-top: 40px;">Historial de Casos</h2>
    <div id="lista-casos"></div>

    <div id="modal">
        <div class="close-btn">&times;</div>
        <div id="modal-content"></div>
    </div>

    <footer>
        Powered by Vigilante System
    </footer>

    <script>
        let db;
        let pendingFiles = [];

        const request = indexedDB.open("VigilanteProDB", 2);
        request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains("casos")) database.createObjectStore("casos", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; mostrarCasos(); };

        const dropZone = document.getElementById('drop-zone');
        dropZone.ondragover = (e) => e.preventDefault();
        dropZone.ondrop = (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    pendingFiles.push({ name: file.name, data: event.target.result, type: file.type });
                    document.getElementById('status').innerText = `Archivos listos: ${pendingFiles.length}`;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('saveBtn').onclick = () => {
            if (!db || pendingFiles.length === 0) return alert("Añade archivos antes de guardar.");
            const tx = db.transaction("casos", "readwrite");
            tx.objectStore("casos").add({ fecha: new Date().toLocaleString(), files: pendingFiles });
            tx.oncomplete = () => { alert("¡Caso guardado!"); pendingFiles = []; document.getElementById('status').innerText = ""; mostrarCasos(); };
        };

        function mostrarCasos() {
            const lista = document.getElementById('lista-casos');
            lista.innerHTML = "";
            db.transaction("casos", "readonly").objectStore("casos").openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div');
                    div.className = 'caso-item';
                    let html = `<strong>Fecha: ${cursor.value.fecha}</strong><br>`;
                    cursor.value.files.forEach(f => {
                        html += `<button style="padding:5px; margin:5px; font-size:12px; width:auto;" onclick='verArchivo(${JSON.stringify(f.data)}, "${f.type}")'>${f.name}</button>`;
                    });
                    div.innerHTML = html;
                    lista.appendChild(div);
                    cursor.continue();
                }
            };
        }

        window.verArchivo = (data, type) => {
            const c = document.getElementById('modal-content');
            c.innerHTML = type.startsWith('image/') ? `<img src="${data}">` : 
                          type.startsWith('video/') ? `<video src="${data}" controls autoplay></video>` :
                          `<audio src="${data}" controls autoplay></audio>`;
            document.getElementById('modal').style.display = 'flex';
        };

        document.querySelector('.close-btn').onclick = () => {
            document.getElementById('modal').style.display = 'none';
            document.querySelectorAll('video, audio').forEach(m => { m.pause(); m.currentTime = 0; });
        };
    </script>
</body>
</html>
