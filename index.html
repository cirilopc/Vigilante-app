<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vigilante | MikePC4000</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vigilante">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .red-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <main class="max-w-lg mx-auto">
        <div class="glass border border-red-900 rounded-3xl p-8 shadow-2xl red-glow">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-red-600 uppercase tracking-tighter">VIGILANTE</h1>
                <p class="text-sm text-gray-500 mt-2 font-mono italic">Powered by MikePC4000</p>
                <p class="text-xs text-red-700 font-bold mt-4 uppercase tracking-widest italic">"Documentando la verdad, restaurando tu paz"</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-red-700 uppercase tracking-widest mb-1">Fecha y Hora</label>
                    <input type="datetime-local" id="timestamp" class="w-full p-3 bg-black border border-red-900/50 rounded-xl text-white focus:border-red-600 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-red-700 uppercase tracking-widest mb-1">Registro de Incidente</label>
                    <textarea id="notes" class="w-full p-3 bg-black border border-red-900/50 rounded-xl h-24 text-white focus:border-red-600 outline-none transition-all" placeholder="Describe los detalles del suceso..."></textarea>
                </div>
                <button onclick="saveEvidence()" class="w-full bg-red-700 hover:bg-red-600 text-white py-4 rounded-xl font-black uppercase tracking-widest transition-all shadow-lg shadow-red-900/20 active:scale-95">
                    Registrar Prueba
                </button>
            </div>

            <div class="mt-10">
                <h2 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-wider border-b border-red-900/30 pb-2">Bitácora Activa</h2>
                <div id="evidenceList" class="space-y-3"></div>
            </div>

            <button onclick="exportToPDF()" class="mt-8 w-full border border-red-900 bg-transparent py-3 rounded-xl text-red-500 font-bold hover:bg-red-950 transition-all text-sm uppercase tracking-widest">
                Exportar Informe
            </button>
        </div>
    </main>

    <script>
        let evidences = JSON.parse(localStorage.getItem('evidences_vigilante')) || [];

        window.onload = () => {
            document.getElementById('timestamp').value = new Date().toISOString().slice(0, 16);
            renderList();
        };

        function saveEvidence() {
            const entry = {
                id: Date.now(),
                timestamp: document.getElementById('timestamp').value,
                notes: document.getElementById('notes').value
            };
            if(!entry.notes) return;
            evidences.unshift(entry);
            localStorage.setItem('evidences_vigilante', JSON.stringify(evidences));
            document.getElementById('notes').value = '';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('evidenceList');
            list.innerHTML = evidences.map(e => `
                <div class="p-4 bg-black/40 border border-red-900/20 rounded-lg hover:border-red-900/50 transition-all">
                    <p class="text-[10px] text-red-600 font-bold mb-1">${new Date(e.timestamp).toLocaleString()}</p>
                    <p class="text-sm text-gray-300">${e.notes}</p>
                </div>
            `).join('');
        }

        function exportToPDF() {
            const report = "INFORME DE EVIDENCIAS - VIGILANTE (MIKEPC4000)\n" + 
                           "Documentando la verdad, restaurando tu paz\n" +
                           "FECHA DE GENERACIÓN: " + new Date().toLocaleString() + "\n" +
                           "--------------------------------------------\n" +
                           evidences.map(e => `FECHA: ${new Date(e.timestamp).toLocaleString()}\nNOTA: ${e.notes}\n---`).join('\n');
            
            // Copia al portapapeles para pegar en WhatsApp, Mail o Notas
            const textarea = document.createElement('textarea');
            textarea.value = report;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            alert("Informe copiado al portapapeles. Listo para presentar ante autoridades.");
        }
    </script>
</body>
</html>
